<div class="form-container">
  <div class="form-header">
    <span class="form-icon">+</span>
    <h2 class="form-title">Add New Product</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="product-form">

    <!-- Code field -->
    <div class="field-group" [class.has-error]="codeControl.invalid && codeControl.touched">
      <label class="field-label" for="code">
        Product Code <span class="required">*</span>
      </label>
      <input
        id="code"
        type="text"
        class="field-input"
        placeholder="e.g. LAPTOP-001"
        formControlName="code"
        autocomplete="off"
        spellcheck="false"
      />
      <span class="field-error" *ngIf="codeControl.touched && codeControl.hasError('required')">
        Product code is required.
      </span>
      <span class="field-error" *ngIf="codeControl.touched && codeControl.hasError('maxlength')">
        Code must not exceed 50 characters.
      </span>
    </div>

    <!-- Name field -->
    <div class="field-group" [class.has-error]="nameControl.invalid && nameControl.touched">
      <label class="field-label" for="name">
        Product Name <span class="required">*</span>
      </label>
      <input
        id="name"
        type="text"
        class="field-input"
        placeholder="e.g. Dell XPS 15 Laptop"
        formControlName="name"
        autocomplete="off"
      />
      <span class="field-error" *ngIf="nameControl.touched && nameControl.hasError('required')">
        Product name is required.
      </span>
      <span class="field-error" *ngIf="nameControl.touched && nameControl.hasError('maxlength')">
        Name must not exceed 200 characters.
      </span>
    </div>

    <!-- Price field -->
    <div class="field-group" [class.has-error]="priceControl.invalid && priceControl.touched">
      <label class="field-label" for="price">
        Price (PLN) <span class="required">*</span>
      </label>
      <div class="input-with-prefix">
        <span class="input-prefix">zł</span>
        <input
          id="price"
          type="number"
          class="field-input"
          placeholder="0.00"
          formControlName="price"
          min="0.01"
          step="0.01"
        />
      </div>
      <span class="field-error" *ngIf="priceControl.touched && priceControl.hasError('required')">
        Price is required.
      </span>
      <span class="field-error" *ngIf="priceControl.touched && priceControl.hasError('min')">
        Price must be greater than zero.
      </span>
    </div>

    <!-- Success banner -->
    <div class="success-banner" *ngIf="successMessage()">
      <span class="status-icon">✓</span>
      {{ successMessage() }}
    </div>

    <!-- Error banner -->
    <div class="error-banner" *ngIf="errorMessage()">
      <span class="status-icon">⚠</span>
      {{ errorMessage() }}
    </div>

    <!-- Submit button -->
    <button
      type="submit"
      class="submit-btn"
      [disabled]="isSubmitting()"
      [class.is-loading]="isSubmitting()"
    >
      <span class="btn-text" *ngIf="!isSubmitting()">
        <span class="btn-icon">+</span>
        Add Product
      </span>
      <span class="btn-spinner" *ngIf="isSubmitting()">
        <span class="spinner-dot"></span>
        <span class="spinner-dot"></span>
        <span class="spinner-dot"></span>
      </span>
    </button>

  </form>
</div>
